{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <title>Document</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">Vixon</a>
    
    <div class="ms-auto d-flex align-items-center">
      {% if user.is_authenticated %}
          <span class="navbar-text me-3">Hello, {{ user.username }}!</span>
          <form action='{% url "logout" %}' method='post' style='display:inline;'>
    {% csrf_token %}
    <button type='submit' class='btn btn-primary btn-sm'>Logout</button>
</form>
      {% else %}
          <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-2">Login</a>
          <a href="{% url 'register' %}" class="btn btn-primary btn-sm">Sign Up</a>
      {% endif %}
    </div>

  </div>
</nav>
    {% block content %}
    {% endblock %}
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
