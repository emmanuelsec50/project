<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .profile-container {
            max-width: 600px;
            margin: 60px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .profile-image {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #4CAF50;
            margin-bottom: 15px;
        }

        .name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .email {
            color: #777;
            margin-bottom: 20px;
        }

        .info {
            text-align: left;
            margin-top: 20px;
        }

        .info div {
            margin: 10px 0;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .label {
            font-weight: bold;
            color: #333;
        }

        .edit-btn {
            margin-top: 25px;
            display: inline-block;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            transition: 0.3s;
        }

        .edit-btn:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<div class="profile-container">

    <!-- Profile Image -->
    <img src="{{ other_user.image.url }}" alt="Profile Picture" class="profile-image">

    

    <!-- Email -->
    <div class="email">
        {{ other_user.email }}
    </div>

    <!-- Edit Button -->
    <a href="{% url 'chat' other_user.user.username %}" class="edit-btn">Message</a>

</div>

</body>
</html>
